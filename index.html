<body>
  <main class="parent-container">
    <div class="intro-container">
      <h1 class="intro-title">Learn to code by watching others</h1>
      <p class="intro-paragraph">See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable</p>
    </div>
    <div class="trial-and-form-container">
        <section class="free-trial-container">
          <p class="text">
            <span class="highlighted-text">Try it free 7 days</span> then $20/mo. thereafter
          </p>
        </section>
        <section class="sign-up-form-container">
          <form class="sign-up-form" action="index.php" method="post" enctype="multipart/form-data">
            <input class="inputs" type="text" placeholder="First Name" name="Firstname">
            <input class="inputs" type="text" placeholder="Last Name" name="Last Name">
            <input class="inputs" type="email" placeholder="Email Address" name="Email">
            <input class="inputs" type="password" placeholder="Password" name="password">
            <button class="claim-button" type="submit">CLAIM YOUR FREE TRIAL</button>
          </form>
          <p class="informative-text">By clicking the button, you are agreeing to our <span class="terms-and-services">Terms and Services</span></p>
        </section>
    </div>
  </main>
  <script defer src="index.js"></script>
</body>
